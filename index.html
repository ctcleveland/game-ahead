<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Ahead</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
  <header>
    <button id="menu-btn" aria-label="Open settings">☰</button>
    <h1>Game Ahead</h1>
    <div></div>
  </header>

  <main>
    <div id="timezone">Times in: <span id="current-tz">Loading...</span></div>
    <div id="games-container">Add teams in settings to see games!</div>
  </main>

  <!-- Settings overlay (now proper floating modal) -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="close-settings" aria-label="Close">✕</button>
      </div>

      <section>
        <h3>Timezone</h3>
        <select id="tz-select"></select>
      </section>

      <section>
        <h3>Teams to Follow</h3>
        <label>League:</label>
        <select id="league-select"></select>
        <ul id="league-teams-list" class="team-results"></ul>

        <h4>Your Selected Teams</h4>
        <ul id="selected-teams-list" class="selected-list"></ul>
      </section>

      <button id="save-settings" class="save-btn">Save & Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

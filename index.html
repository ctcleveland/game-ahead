<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Ahead</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 2rem;
      text-align: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 2.5rem;
      color: #60a5fa;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.3rem;
      margin: 1rem 0;
    }
    #tz {
      font-weight: bold;
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <h1>Game Ahead</h1>
  <p>Your lookahead to the games that matter.</p>
  <p>Current timezone: <span id="tz">Detecting...</span></p>

  <script>
    document.getElementById("tz").textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
  </script>
</body>
</html>
